      - solargraph
      main_program: ruby
      maintainers: []
      modes:
        attrs:
        - ruby
        code_mirror_mode: ruby
        extensions:
        - rb
      settings_schema:
        packages:
          defaultValue: []
          hidden: true
          listType:
            type: string
          title: List of packages
          type: list
        enable:
          defaultValue: false
          hidden: true
          title: Enable Ruby kernel
          type: boolean
        interface.attrs:
          defaultValue:
          - ruby
          description: Notebook cells that have these attributes will match this kernel,
            allowing it to run the code.
          listType:
            type: string
          title: Notebook attributes
          type: list
        interface.extensions:
          defaultValue:
          - rb
          description: Files with these extensions will match against this kernel,
            allowing you to run the code as if it were a Jupyter cell.
          listType:
            type: string
          title: File extensions
          type: list
        lsp.solargraph.enable:
          defaultValue: true
          title: Enable Solargraph language server
          type: boolean
        lsp.solargraph.rubocopYaml:
          codeMirrorMode: yaml
          defaultValue: |
            # Disable whitespace-related rules that don't play well with notebooks
            Layout/EmptyLines:
              Enabled: false
            Layout/LeadingEmptyLines:
              Enabled: false
            Layout/TrailingEmptyLines:
              Enabled: false

            # This one seems to appear randomly
            Style/FrozenStringLiteralComment:
              Enabled: false
          title: YAML configuration for the rubocop reporter
          type: lines
        misc.enableVariableInspector:
          defaultValue: true
          description: This will show a summary of the currently defined variables
            in the UI.
          title: Enable the variable inspector
          type: boolean
        rubyPackage:
          defaultValue: ruby
          title: Ruby version
          type: enum
          values:
          - ruby
          - ruby_3_3
          - ruby_3_4
      spdx_id: Ruby
