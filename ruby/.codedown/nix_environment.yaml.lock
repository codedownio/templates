      codeMirrorMode: nix
      defaultValue: ''
      description: Arbitrary Nix expression that evaluates to a derivation, which
        will be joined into the environment. The expression has "pkgs" in scope, an
        imported Nixpkgs package set.
      loc:
      - extraNix
      placeholder: |
        with pkgs;
        symlinkJoin {
          name = "extra-packages";
          paths = [ hello cowsay ];
