  packages:
  - name: kernels.ruby
    settings:
      enable: true
    meta:
      name: ruby-3.4.9
      description: Object-oriented language for quick and easy programming
      display_name: Ruby
      has_packages: true
      homepage: https://www.ruby-lang.org/
      icon: /nix/store/sc66pp2sd7ia91x4yy4clsb51vqrk6jj-iruby-64x64.png
      icon_monochrome: /nix/store/alkhracd1cin435ydiz8av3zbs6jjhy8-ruby-monochrome.svg
